<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { background: #121214; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        form { background: #1a1a1e; padding: 30px; border-radius: 10px; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #6366f1; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <form id="loginForm">
        <h2>Login</h2>
        <input type="text" id="user" placeholder="Username" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit">Σύνδεση</button>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            if ((u === 'marinos' && p === 'marinos') || (u === 'giorgos' && p === 'giorgos')) {
                alert("Καλώς ήρθες!");
            } else {
                alert("Λάθος στοιχεία!");
            }
        });
    </script>
</body>
</html>
