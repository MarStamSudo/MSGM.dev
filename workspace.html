<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Dev Workspace (Supabase)</title>
    <style>
        :root {
            --bg-dark: #121214;
            --sidebar-bg: #1a1a1e;
            --card-bg: #222227;
            --accent-color: #3ecf8e; /* Το χαρακτηριστικό πράσινο του Supabase */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2e2e35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .workspace-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--accent-color);
        }

        .menu-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .menu-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-links a {
            color: var(--text-main);
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            display: block;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .menu-links a:hover, .menu-links a.active {
            background-color: var(--card-bg);
            color: var(--accent-color);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
            height: 100%;
        }

        .chat-container {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .section-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.other {
            background-color: var(--card-bg);
            align-self: flex-start;
        }

        .message.mine {
            background-color: var(--accent-color);
            color: #121214; /* Σκούρο κείμενο για να κάνει αντίθεση με το πράσινο */
            font-weight: 500;
            align-self: flex-end;
        }

        .message .meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: block;
        }
        
        .message.mine .meta {
            color: #1e5239;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex-grow: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            outline: none;
        }

        .chat-input-area button {
            background-color: var(--accent-color);
            color: #121214;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .projects-container {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            height: 100%;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .projects-container { display: none; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="workspace-title">⚡ SupaRoom_</div>
        <p class="menu-label">Διαχείριση</p>
        <ul class="menu-links">
            <li><a href="#" class="active">💬 Συζήτηση</a></li>
            <li><a href="#">📁 Projects</a></li>
            <li><a href="#">⚙️ Ρυθμίσεις</a></li>
            <li><a href="#" onclick="logout()" style="color: #ef4444; margin-top: 20px;">🚪 Αποσύνδεση</a></li>
        </ul>
    </aside>

    <main>
        <div class="chat-container">
            <div class="section-header"># general-chat</div>
            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Γράψε ένα μήνυμα...">
                <button onclick="sendMessage()">Αποστολή</button>
            </div>
        </div>

        <div class="projects-container">
            <div class="section-header" style="padding:0 0 10px 0; border-bottom:1px solid var(--border-color)">📌 Active Projects</div>
            <p style="margin-top: 15px; color: var(--text-muted); font-size: 0.9rem;">Βάση Δεδομένων: Supabase PostgreSQL ⚡</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ⚠️ ΑΝΤΙΚΑΤΑΣΤΗΣΕ ΤΑ ΠΑΡΑΚΑΤΩ ΜΕ ΤΑ ΔΙΚΑ ΣΟΥ ΣΤΟΙΧΕΙΑ ΑΠΟ ΤΟ SUPABASE SETTINGS -> API
        const SUPABASE_URL = "https://gwqcqfiqgkpobvfbtvzf.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3cWNxZmlxZ2twb2J2ZmJ0dnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTc5NjEsImV4cCI6MjA5NjkzMzk2MX0.U_ZmkI5l0y-48FLE08lLPmvpKIuqKr5b7_ZLIdSMPJk";

        const supabase = supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

        // Ρύθμιση Username (Ζητάει όνομα την πρώτη φορά)
        let myName = localStorage.getItem('chat_username');
        if (!myName) {
            myName = prompt("Δώσε το μικρό σου όνομα για το chat:") || "Anonymous";
            localStorage.setItem('chat_username', myName);
        }

        // Συνάρτηση για να εμφανίζεται ένα μήνυμα στο UI
        function appendMessage(sender, text) {
            const chatMessages = document.getElementById('chatMessages');
            const isMine = sender === myName;
            const messageClass = isMine ? 'message mine' : 'message other';
            
            const newMessage = document.createElement('div');
            newMessage.className = messageClass;
            newMessage.innerHTML = `<span class="meta">${sender}</span>${text}`;
            
            chatMessages.appendChild(newMessage);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto scroll down
        }

        // 1. Φόρτωση παλιών μηνυμάτων κατά το άνοιγμα της σελίδας
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });

            if (!error && data) {
                data.forEach(msg => {
                    appendMessage(msg.sender, msg.text);
                });
            }
        }
        loadMessages();

        // 2. Λειτουργία Αποστολής Μηνύματος (Insert στη PostgreSQL)
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const messageText = input.value.trim();
            
            if (messageText !== '') {
                const { error } = await supabase
                    .from('messages')
                    .insert([{ sender: myName, text: messageText }]);
                
                if (error) console.error("Error sending message:", error);
                input.value = '';
            }
        }

        // 3. REAL-TIME ΑΚΡΟΑΣΗ (Ακούει για νέα inserts στον πίνακα messages)
        supabase
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', scheme: 'public', table: 'messages' }, payload => {
                const newMsg = payload.new;
                appendMessage(newMsg.sender, newMsg.text);
            })
            .subscribe();

        // Αποστολή με το Enter
        document.getElementById('messageInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
