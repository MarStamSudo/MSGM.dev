<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Dev Workspace (Supabase)</title>
    <style>
        :root {
            --bg-dark: #121214;
            --sidebar-bg: #1a1a1e;
            --card-bg: #222227;
            --accent-color: #3ecf8e; 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2e2e35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .workspace-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--accent-color);
        }

        .menu-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .menu-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-links a {
            color: var(--text-main);
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            display: block;
            font-size: 0.95rem;
            transition: background 0.2s;
            cursor: pointer;
        }

        .menu-links a:hover, .menu-links a.active {
            background-color: var(--card-bg);
            color: var(--accent-color);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
            height: 100%;
        }

        /* Tabs Logic */
        .tab-content {
            display: none;
            height: 100%;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .main-panel {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .section-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.other { background-color: var(--card-bg); align-self: flex-start; }
        .message.mine { background-color: var(--accent-color); color: #121214; font-weight: 500; align-self: flex-end; }
        .message .meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; display: block; }
        .message.mine .meta { color: #1e5239; }

        .input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex-grow: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            outline: none;
        }

        .input-area button {
            background-color: var(--accent-color);
            color: #121214;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Projects List Styling */
        .projects-list-page {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .project-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-badge {
            background-color: rgba(62, 207, 142, 0.2);
            color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .sidebar-projects {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 10px;
            background: var(--card-bg);
            margin-top: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent-color);
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .sidebar-projects { display: none; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="workspace-title">⚡ SupaRoom_</div>
        <p class="menu-label">Διαχείριση</p>
        <ul class="menu-links">
            <li><a onclick="switchTab('chat')" id="tab-link-chat" class="active">💬 Συζήτηση</a></li>
            <li><a onclick="switchTab('projects')" id="tab-link-projects">📁 Projects</a></li>
            <li><a onclick="logout()" style="color: #ef4444; margin-top: 20px;">🚪 Αποσύνδεση</a></li>
