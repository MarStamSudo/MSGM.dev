<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Dev Workspace (Supabase)</title>
    <style>
        :root {
            --bg-dark: #121214;
            --sidebar-bg: #1a1a1e;
            --card-bg: #222227;
            --accent-color: #3ecf8e; 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2e2e35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .workspace-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--accent-color);
        }

        .menu-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .menu-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-links a {
            color: var(--text-main);
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            display: block;
            font-size: 0.95rem;
            transition: background 0.2s;
            cursor: pointer;
        }

        .menu-links a:hover, .menu-links a.active {
            background-color: var(--card-bg);
            color: var(--accent-color);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
            height: 100%;
        }

        /* Tabs Logic */
        .tab-content {
            display: none;
            height: 100%;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .main-panel {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .section-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.other { background-color: var(--card-bg); align-self: flex-start; }
        .message.mine { background-color: var(--accent-color); color: #121214; font-weight: 500; align-self: flex-end; }
        .message .meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; display: block; }
        .message.mine .meta { color: #1e5239; }

        .input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex-grow: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            outline: none;
        }

        .input-area button {
            background-color: var(--accent-color);
            color: #121214;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Projects List Styling */
        .projects-list-page {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .project-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-badge {
            background-color: rgba(62, 207, 142, 0.2);
            color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .sidebar-projects {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 10px;
            background: var(--card-bg);
            margin-top: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent-color);
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .sidebar-projects { display: none; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="workspace-title">⚡ SupaRoom_</div>
        <p class="menu-label">Διαχείριση</p>
        <ul class="menu-links">
            <li><a onclick="switchTab('chat')" id="tab-link-chat" class="active">💬 Συζήτηση</a></li>
            <li><a onclick="switchTab('projects')" id="tab-link-projects">📁 Projects</a></li>
            <li><a onclick="logout()" style="color: #ef4444; margin-top: 20px;">🚪 Αποσύνδεση</a></li>
        </ul>
    </aside>

    <main>
        <div id="tab-chat" class="tab-content active">
            <div class="main-panel">
                <div class="section-header"># general-chat</div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Γράψε ένα μήνυμα...">
                    <button onclick="sendMessage()">Αποστολή</button>
                </div>
            </div>
        </div>

        <div id="tab-projects" class="tab-content">
            <div class="main-panel">
                <div class="section-header">📁 Διαχείριση Projects</div>
                <div class="projects-list-page" id="mainProjectsList"></div>
                <div class="input-area">
                    <input type="text" id="projectInput" placeholder="Όνομα νέου Project...">
                    <button onclick="createNewProject()">Προσθήκη</button>
                </div>
            </div>
        </div>

        <div class="sidebar-projects">
            <div class="section-header" style="padding:0 0 10px 0; border-bottom:1px solid var(--border-color)">📌 Active Projects</div>
            <div id="sidebarProjectsList">
                </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Στοιχεία Supabase API (Έτοιμα και ρυθμισμένα σωστά)
        const SUPABASE_URL = "https://gwqcqfiqgkpobvfbtvzf.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3cWNxZmlxZ2twb2J2ZmJ0dnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTc5NjEsImV4cCI6MjA5NjkzMzk2MX0.U_ZmkI5l0y-48FLE08lLPmvpKIuqKr5b7_ZLIdSMPJk";

        // Αρχικοποίηση client
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Ρύθμιση Username
        let myName = localStorage.getItem('chat_username');
        if (!myName) {
            myName = "Anonymous";
        }

        // --- TAB SWITCHER LOGIC ---
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.menu-links a').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`tab-link-${tabName}`).classList.add('active');
        }

        // --- CHAT LOGIC ---
        function appendMessage(sender, text) {
            const chatMessages = document.getElementById('chatMessages');
            const isMine = sender === myName;
            const messageClass = isMine ? 'message mine' : 'message other';
            const newMessage = document.createElement('div');
            newMessage.className = messageClass;
            newMessage.innerHTML = `<span class="meta">${sender}</span>${text}`;
            chatMessages.appendChild(newMessage);
            chatMessages.scrollTop = chatMessages.scrollHeight; 
        }

        async function loadMessages() {
            const { data, error } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            if (data) data.forEach(msg => appendMessage(msg.sender, msg.text));
        }
        loadMessages();

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const messageText = input.value.trim();
            if (messageText !== '') {
                await supabaseClient.from('messages').insert([{ sender: myName, text: messageText }]);
                input.value = '';
            }
        }

        // --- PROJECTS LOGIC ---
        function updateProjectUI(title) {
            // Προσθήκη στο δεξί panel (Sidebar)
            const sidebarList = document.getElementById('sidebarProjectsList');
            const sidebarItem = document.createElement('div');
            sidebarItem.className = 'sidebar-item';
            sidebarItem.innerText = title;
            sidebarList.appendChild(sidebarItem);

            // Προσθήκη στην κεντρική σελίδα διαχείρισης Projects
            const mainList = document.getElementById('mainProjectsList');
            const projectCard = document.createElement('div');
            projectCard.className = 'project-card';
            projectCard.innerHTML = `<span>📁 ${title}</span> <span class="project-badge">Active</span>`;
            mainList.appendChild(projectCard);
        }

        async function loadProjects() {
            const { data, error } = await supabaseClient.from('projects').select('*').order('created_at', { ascending: true });
            if (data) {
                document.getElementById('sidebarProjectsList').innerHTML = '';
                document.getElementById('mainProjectsList').innerHTML = '';
                data.forEach(proj => updateProjectUI(proj.title));
            }
        }
        loadProjects();

        async function createNewProject() {
            const input = document.getElementById('projectInput');
            const projectTitle = input.value.trim();
            if (projectTitle !== '') {
                const { error } = await supabaseClient.from('projects').insert([{ title: projectTitle, status: 'Active' }]);
                if (error) console.error(error);
                input.value = '';
            }
        }

        // --- REAL-TIME ΣΥΝΔΕΣΕΙΣ (SUPABASE REALTIME) ---
        // Realtime για Μηνύματα
        supabaseClient
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                appendMessage(payload.new.sender, payload.new.text);
            }).subscribe();

        // Realtime για Projects
        supabaseClient
            .channel('public:projects')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'projects' }, payload => {
                updateProjectUI(payload.new.title);
            }).subscribe();

        // Listeners για το πάτημα του Enter στα inputs
        document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('projectInput').addEventListener('keypress', e => { if (e.key === 'Enter') createNewProject(); });

        // Αποσύνδεση
        function logout() { localStorage.removeItem('chat_username'); location.reload(); }
    </script>
</body>
</html>
