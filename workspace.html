<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaRoom_ — Dev Workspace</title>
    <style>
        :root {
            --bg-dark: #121214;
            --sidebar-bg: #1a1a1e;
            --card-bg: #222227;
            --accent-color: #3ecf8e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2e2e35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* ── Sidebar ── */
        aside {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .workspace-title { font-size: 1.2rem; font-weight: 700; color: var(--accent-color); margin-bottom: 14px; }

        /* User badge */
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 24px;
        }
        .avatar-sm {
            width: 32px; height: 32px; border-radius: 50%;
            background-color: var(--accent-color);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: #121214; flex-shrink: 0;
        }
        .user-details { display: flex; flex-direction: column; }
        .user-name { font-size: 13px; font-weight: 600; color: var(--text-main); }
        .online-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--accent-color); }
        .dot { width: 6px; height: 6px; border-radius: 50%; background-color: var(--accent-color); }

        .menu-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 10px; }
        .menu-links { list-style: none; display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .menu-links a {
            color: var(--text-main); text-decoration: none;
            padding: 9px 10px; border-radius: 6px; display: flex; align-items: center; gap: 9px;
            font-size: 0.9rem; transition: background 0.15s; cursor: pointer;
        }
        .menu-links a:hover, .menu-links a.active { background-color: var(--card-bg); color: var(--accent-color); }
        .menu-links a.logout { color: #ef4444; margin-top: auto; }

        /* ── Main ── */
        main { flex: 1; display: grid; grid-template-columns: 2fr 1fr; gap: 16px; padding: 16px; height: 100%; overflow: hidden; }

        .chat-container {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex; flex-direction: column; height: 100%; overflow: hidden;
        }

        .chat-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
        }
        .channel-name { font-weight: 600; font-size: 0.95rem; }
        .realtime-pill {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--accent-color);
            background: rgba(62,207,142,0.1);
            padding: 4px 10px; border-radius: 99px;
        }

        /* Messages */
        .chat-messages { flex-grow: 1; padding: 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }

        .msg-row { display: flex; gap: 10px; align-items: flex-start; }
        .msg-row.mine { flex-direction: row-reverse; }

        .avatar {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; flex-shrink: 0;
        }
        .avatar.other { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-muted); }
        .avatar.me { background-color: var(--accent-color); color: #121214; }

        .bubble-wrap { display: flex; flex-direction: column; gap: 3px; max-width: 75%; }
        .msg-row.mine .bubble-wrap { align-items: flex-end; }

        .msg-meta { font-size: 11px; color: var(--text-muted); }

        .bubble { padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; word-break: break-word; }
        .bubble.other { background-color: var(--card-bg); border-radius: 4px 10px 10px 10px; }
        .bubble.mine { background-color: var(--accent-color); color: #121214; font-weight: 500; border-radius: 10px 4px 10px 10px; }

        /* Date divider */
        .date-divider {
            display: flex; align-items: center; gap: 10px;
            font-size: 11px; color: var(--text-muted); margin: 4px 0;
        }
        .date-divider::before, .date-divider::after {
            content: ''; flex: 1; border-top: 1px solid var(--border-color);
        }

        /* Input */
        .chat-input-area { padding: 14px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; align-items: center; }
        .chat-input-area input {
            flex-grow: 1; background-color: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 8px;
            padding: 11px 14px; color: var(--text-main); font-size: 0.9rem; outline: none;
            transition: border-color 0.15s;
        }
        .chat-input-area input:focus { border-color: var(--accent-color); }
        .chat-input-area button {
            background-color: var(--accent-color); color: #121214;
            border: none; padding: 0 18px; height: 42px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: opacity 0.15s;
        }
        .chat-input-area button:hover { opacity: 0.85; }

        /* Projects panel */
        .projects-container {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            height: 100%;
            overflow-y: auto;
        }
        .section-header { font-weight: 600; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); margin-bottom: 14px; }
        .db-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--accent-color);
            background: rgba(62,207,142,0.1);
            padding: 5px 10px; border-radius: 6px; margin-bottom: 16px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 99px; }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .projects-container { display: none; }
        }
    </style>
</head>
<body>

<aside>
    <div class="workspace-title">⚡ SupaRoom_</div>

    <div class="user-badge">
        <div class="avatar-sm" id="sidebarAvatar"></div>
        <div class="user-details">
            <span class="user-name" id="sidebarName"></span>
            <span class="online-status"><span class="dot"></span>online</span>
        </div>
    </div>

    <p class="menu-label">Διαχείριση</p>
    <ul class="menu-links">
        <li><a href="#" class="active">💬 Συζήτηση</a></li>
        <li><a href="#">📁 Projects</a></li>
        <li><a href="#">⚙️ Ρυθμίσεις</a></li>
        <li><a href="#" onclick="logout()" class="logout">🚪 Αποσύνδεση</a></li>
    </ul>
</aside>

<main>
    <div class="chat-container">
        <div class="chat-header">
            <span class="channel-name"># general-chat</span>
            <span class="realtime-pill" id="realtimePill">
                <span class="dot"></span> Realtime
            </span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="date-divider">Σήμερα</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Γράψε ένα μήνυμα... (Enter για αποστολή)" autocomplete="off">
            <button onclick="sendMessage()">Αποστολή</button>
        </div>
    </div>

    <div class="projects-container">
        <div class="section-header">📌 Active Projects</div>
        <div class="db-badge">⚡ Supabase PostgreSQL</div>
        <p style="color: var(--text-muted); font-size: 0.85rem; line-height: 1.6;">
            Realtime subscriptions ενεργά.<br>
            Όλα τα μηνύματα αποθηκεύονται αυτόματα.
        </p>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ── Supabase config ──────────────────────────────
    const SUPABASE_URL     = "https://gwqcqfiqgkpobvfbtvzf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3cWNxZmlxZ2twb2J2ZmJ0dnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTc5NjEsImV4cCI6MjA5NjkzMzk2MX0.U_ZmkI5l0y-48FLE08lLPmvpKIuqKr5b7_ZLIdSMPJk";
    const supabaseClient   = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Username ─────────────────────────────────────
    let myName = localStorage.getItem('chat_username');
    if (!myName) {
        myName = prompt("Δώσε το μικρό σου όνομα για το chat:") || "Anonymous";
        localStorage.setItem('chat_username', myName);
    }

    // Sidebar avatar & name
    document.getElementById('sidebarName').textContent = myName;
    document.getElementById('sidebarAvatar').textContent = initials(myName);

    // ── Helpers ──────────────────────────────────────
    function initials(name) {
        return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function formatTime(isoString) {
        const d = isoString ? new Date(isoString) : new Date();
        return d.toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
    }

    // Track IDs of already-rendered messages to avoid duplicates from realtime
    const renderedIds = new Set();

    // ── Render a message ─────────────────────────────
    function appendMessage(sender, text, timestamp, id) {
        if (id && renderedIds.has(id)) return;
        if (id) renderedIds.add(id);

        const chatMessages = document.getElementById('chatMessages');
        const isMine = sender === myName;
        const av = initials(sender);
        const time = formatTime(timestamp);

        const row = document.createElement('div');
        row.className = 'msg-row' + (isMine ? ' mine' : '');
        row.innerHTML = `
            <div class="avatar ${isMine ? 'me' : 'other'}">${av}</div>
            <div class="bubble-wrap">
                <span class="msg-meta">${isMine ? '' : sender + ' · '}${time}</span>
                <div class="bubble ${isMine ? 'mine' : 'other'}">${escapeHtml(text)}</div>
            </div>`;

        chatMessages.appendChild(row);
        row.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Load history ─────────────────────────────────
    async function loadMessages() {
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .order('created_at', { ascending: true });

        if (error) { console.error('Load error:', error); return; }
        data?.forEach(msg => appendMessage(msg.sender, msg.text, msg.created_at, msg.id));
    }
    loadMessages();

    // ── Send ─────────────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text  = input.value.trim();
        if (!text) return;

        input.value = '';
        // Optimistic render (no id yet — realtime will bring the real one)
        appendMessage(myName, text, null, null);

        const { error } = await supabaseClient
            .from('messages')
            .insert([{ sender: myName, text }]);

        if (error) console.error('Send error:', error);
    }

    // ── Realtime ─────────────────────────────────────
    supabaseClient
        .channel('public:messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            const msg = payload.new;
            // Only render incoming messages from OTHER users (own are already rendered optimistically)
            if (msg.sender !== myName) {
                appendMessage(msg.sender, msg.text, msg.created_at, msg.id);
            }
        })
        .subscribe(status => {
            const pill = document.getElementById('realtimePill');
            if (status === 'SUBSCRIBED') {
                pill.style.color = '#3ecf8e';
            } else {
                pill.style.color = '#9ca3af';
            }
            console.log('Realtime:', status);
        });

    // ── Keyboard ─────────────────────────────────────
    document.getElementById('messageInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ── Logout ───────────────────────────────────────
    function logout() {
        if (confirm('Θέλεις σίγουρα να αποσυνδεθείς;')) {
            localStorage.removeItem('chat_username');
            location.reload();
        }
    }
</script>
</body>
</html>
