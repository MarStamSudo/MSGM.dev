<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSGM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #06060f;
            --layer1:    #0d0d1f;
            --layer2:    #12122a;
            --layer3:    #1a1a35;
            --violet:    #7c3aed;
            --violet-lo: #7c3aed22;
            --cyan:      #00f5ff;
            --cyan-lo:   #00f5ff18;
            --magenta:   #ff006e;
            --mag-lo:    #ff006e18;
            --white:     #f0f0ff;
            --muted:     #6b7280;
            --border:    #1e1e40;
            --font-ui:   'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background: var(--bg);
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── PARTICLE CANVAS ── */
        #particles {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* ── SIDEBAR ── */
        aside {
            width: 72px;
            background: var(--layer1);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 8px;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .logo {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--violet), var(--cyan));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            box-shadow: 0 0 20px var(--violet);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 15px var(--violet); }
            50%       { box-shadow: 0 0 30px var(--cyan), 0 0 60px var(--violet); }
        }

        .nav-btn {
            width: 44px; height: 44px;
            border: 1px solid transparent;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
            position: relative;
        }

        .nav-btn:hover { background: var(--layer2); color: var(--white); border-color: var(--border); }

        .nav-btn.active {
            background: var(--violet-lo);
            color: var(--cyan);
            border-color: var(--violet);
        }

        .nav-btn .badge {
            position: absolute;
            top: 6px; right: 6px;
            width: 8px; height: 8px;
            background: var(--magenta);
            border-radius: 50%;
            border: 2px solid var(--bg);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
        }

        .nav-spacer { flex: 1; }

        .avatar-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--magenta), var(--violet));
            border: 2px solid var(--border);
            cursor: pointer;
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .avatar-btn::after {
            content: '';
            position: absolute;
            bottom: 2px; right: 2px;
            width: 10px; height: 10px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid var(--layer1);
        }

        .avatar-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--violet); }

        /* ── MAIN LAYOUT ── */
        #app {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        /* ── PANELS ── */
        .panel { display: none; flex: 1; }
        .panel.active { display: flex; }

        /* ── CHAT PANEL ── */
        #panel-chat {
            flex-direction: column;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--layer1);
            flex-shrink: 0;
        }

        .channel-indicator {
            width: 10px; height: 10px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan);
            animation: blink 2s infinite;
        }

        .chat-header h2 { font-size: 1rem; font-weight: 600; }
        .chat-header span { font-size: 0.8rem; color: var(--muted); margin-left: auto; font-family: var(--font-mono); }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--bg);
        }

        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Date divider */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0 8px;
            color: var(--muted);
            font-size: 0.72rem;
            font-family: var(--font-mono);
            letter-spacing: 0.05em;
        }
        .date-divider::before, .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Message row */
        .msg-row {
            display: flex;
            gap: 10px;
            padding: 4px 0;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .msg-row:hover { background: var(--layer1); padding-left: 6px; margin-left: -6px; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
            font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600;
            margin-top: 2px;
        }

        .msg-avatar.is-mine {
            background: linear-gradient(135deg, var(--violet), var(--cyan));
        }

        .msg-avatar.is-other {
            background: linear-gradient(135deg, var(--magenta), var(--violet));
        }

        .msg-body { flex: 1; }

        .msg-meta {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 3px;
        }

        .msg-name {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .is-mine .msg-name { color: var(--cyan); }
        .is-other .msg-name { color: var(--magenta); }

        .msg-time {
            font-size: 0.7rem;
            color: var(--muted);
            font-family: var(--font-mono);
        }

        .msg-text {
            font-size: 0.92rem;
            line-height: 1.5;
            color: #d4d4f0;
        }

        /* New message animation */
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg-row.new { animation: msgIn 0.3s ease; }

        /* Typing indicator */
        .typing-bar {
            padding: 6px 24px;
            font-size: 0.75rem;
            color: var(--muted);
            font-style: italic;
            min-height: 26px;
            background: var(--bg);
        }

        .typing-dots span {
            display: inline-block;
            width: 4px; height: 4px;
            background: var(--cyan);
            border-radius: 50%;
            margin: 0 1px;
            animation: dotBounce 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40%            { transform: translateY(-6px); }
        }

        /* Input bar */
        .input-bar {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--layer1);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .emoji-btn {
            width: 36px; height: 36px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .emoji-btn:hover { border-color: var(--violet); color: var(--white); }

        .msg-input {
            flex: 1;
            background: var(--layer2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            color: var(--white);
            font-family: var(--font-ui);
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .msg-input:focus { border-color: var(--violet); box-shadow: 0 0 0 3px var(--violet-lo); }
        .msg-input::placeholder { color: var(--muted); }

        .send-btn {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--violet), var(--cyan));
            border: none;
            border-radius: 8px;
            color: var(--bg);
            cursor: pointer;
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .send-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--violet); }
        .send-btn:active { transform: scale(0.95); }

        /* ── PROJECTS PANEL ── */
        #panel-projects {
            display: none;
            gap: 0;
        }
        #panel-projects.active { display: flex; }

        .projects-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .projects-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--layer1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .projects-header h2 { font-size: 1rem; font-weight: 600; }

        .projects-grid {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            align-content: start;
        }

        .projects-grid::-webkit-scrollbar { width: 4px; }
        .projects-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .proj-card {
            background: var(--layer1);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s;
            animation: cardIn 0.4s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .proj-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--violet), var(--cyan));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .proj-card:hover {
            border-color: var(--violet);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px #7c3aed22;
        }

        .proj-card:hover::before { opacity: 1; }

        .proj-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .proj-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: var(--violet-lo);
            border: 1px solid var(--violet);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        .proj-status {
            font-size: 0.72rem;
            font-family: var(--font-mono);
            padding: 4px 8px;
            border-radius: 20px;
            background: #22c55e18;
            color: #22c55e;
            border: 1px solid #22c55e40;
        }

        .proj-status.paused {
            background: #f59e0b18;
            color: #f59e0b;
            border-color: #f59e0b40;
        }

        .proj-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .proj-desc {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .proj-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-family: var(--font-mono);
        }

        .proj-progress-bar {
            height: 4px;
            background: var(--layer3);
            border-radius: 2px;
            overflow: hidden;
        }

        .proj-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--violet), var(--cyan));
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        .proj-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .proj-date {
            font-size: 0.72rem;
            color: var(--muted);
            font-family: var(--font-mono);
        }

        .proj-delete {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .proj-delete:hover { color: var(--magenta); background: var(--mag-lo); }

        /* Create project input */
        .create-project-bar {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--layer1);
            display: flex;
            gap: 10px;
        }

        .proj-input {
            flex: 1;
            background: var(--layer2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            color: var(--white);
            font-family: var(--font-ui);
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .proj-input:focus { border-color: var(--violet); box-shadow: 0 0 0 3px var(--violet-lo); }
        .proj-input::placeholder { color: var(--muted); }

        .add-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--violet), var(--cyan));
            border: none;
            border-radius: 10px;
            color: var(--bg);
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-btn:hover { transform: scale(1.03); box-shadow: 0 0 20px var(--violet); }

        /* Projects Sidebar */
        .projects-sidebar {
            width: 240px;
            background: var(--layer1);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-head {
            padding: 18px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            font-family: var(--font-mono);
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .sidebar-proj-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .sidebar-proj-item {
            padding: 10px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.15s;
            margin-bottom: 2px;
        }

        .sidebar-proj-item:hover { background: var(--layer2); }

        .sidebar-proj-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            flex-shrink: 0;
        }

        .sidebar-proj-name {
            font-size: 0.85rem;
            color: #b0b0d0;
        }

        /* Stats sidebar panel */
        .stats-sidebar {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-item {
            background: var(--layer2);
            border-radius: 8px;
            padding: 12px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--violet), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── NOTIFICATIONS ── */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            background: var(--layer2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--cyan);
            border-radius: 10px;
            padding: 12px 16px;
            min-width: 260px;
            max-width: 320px;
            font-size: 0.85rem;
            box-shadow: 0 8px 32px #0005;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateX(20px); }
        }

        .toast.leaving { animation: toastOut 0.3s ease forwards; }

        .toast-title { font-weight: 600; color: var(--cyan); margin-bottom: 3px; }
        .toast-body  { color: var(--muted); }

        /* Mood selector */
        .mood-row {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .mood-btn {
            background: var(--layer2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.15s;
            font-family: var(--font-ui);
        }

        .mood-btn:hover, .mood-btn.active {
            border-color: var(--violet);
            color: var(--white);
            background: var(--violet-lo);
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
        }

        .empty-state p { font-size: 0.9rem; }

        /* ── GLOW EFFECTS ── */
        .glow-violet { text-shadow: 0 0 20px var(--violet); }
        .glow-cyan   { text-shadow: 0 0 20px var(--cyan); }

        /* ── SCROLLBAR GLOBAL ── */
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        /* Responsive */
        @media (max-width: 700px) {
            .projects-sidebar { display: none; }
            .projects-grid { grid-template-columns: 1fr; }
        }

        /* Ambient glow blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
            animation: blobMove 12s ease-in-out infinite alternate;
        }

        .blob-1 {
            width: 500px; height: 500px;
            background: var(--violet);
            top: -100px; left: -100px;
        }

        .blob-2 {
            width: 400px; height: 400px;
            background: var(--cyan);
            bottom: -100px; right: 100px;
            animation-delay: -4s;
        }

        .blob-3 {
            width: 300px; height: 300px;
            background: var(--magenta);
            top: 40%; left: 40%;
            animation-delay: -8s;
        }

        @keyframes blobMove {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.1); }
        }
    </style>
</head>
<body>

<!-- Ambient blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Particle canvas -->
<canvas id="particles"></canvas>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Sidebar nav -->
<aside>
    <div class="logo" title="SupaRoom">⚡</div>
    <button class="nav-btn active" id="nav-chat" onclick="switchPanel('chat')" title="Chat">💬 <span class="badge"></span></button>
    <button class="nav-btn" id="nav-projects" onclick="switchPanel('projects')" title="Projects">📁</button>
    <div class="nav-spacer"></div>
    <button class="avatar-btn" onclick="logout()" title="Αποσύνδεση" id="myAvatar">👤</button>
</aside>

<!-- Main app -->
<div id="app">

    <!-- CHAT PANEL -->
    <div class="panel active" id="panel-chat">
        <div class="chat-header">
            <div class="channel-indicator"></div>
            <h2># general</h2>
            <span id="onlineCount">● 0 online</span>
        </div>

        <div class="mood-row" id="moodRow"></div>

        <div class="messages-area" id="messagesArea">
            <div class="date-divider">σήμερα</div>
        </div>

        <div class="typing-bar" id="typingBar"></div>

        <div class="input-bar">
            <button class="emoji-btn" onclick="insertEmoji()" title="Emoji">😊</button>
            <input class="msg-input" id="msgInput" placeholder="Γράψε κάτι..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()" title="Αποστολή">➤</button>
        </div>
    </div>

    <!-- PROJECTS PANEL -->
    <div class="panel" id="panel-projects">
        <div class="projects-main">
            <div class="projects-header">
                <h2>📁 Projects</h2>
                <span style="font-size:0.8rem; color:var(--muted); font-family:var(--font-mono)" id="projCount">0 active</span>
            </div>
            <div class="projects-grid" id="projectsGrid">
                <div class="empty-state">
                    <span class="empty-icon">🚀</span>
                    <p>Κανένα project ακόμα.<br>Πρόσθεσε το πρώτο!</p>
                </div>
            </div>
            <div class="create-project-bar">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

let myName = localStorage.getItem('chat_username');

/* ════════════════════════════════════
   PARTICLES
════════════════════════════════════ */
(function() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let mouse = { x: -1000, y: -1000 };
    let dots = [];
    const N = 60;

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function init() {
        resize();
        dots = Array.from({ length: N }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 1.5 + 0.5
        }));
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('resize', resize);

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        dots.forEach(d => {
            d.x += d.vx;
            d.y += d.vy;
            if (d.x < 0 || d.x > canvas.width)  d.vx *= -1;
            if (d.y < 0 || d.y > canvas.height) d.vy *= -1;

            const dist = Math.hypot(d.x - mouse.x, d.y - mouse.y);
            if (dist < 120) {
                d.x += (d.x - mouse.x) * 0.03;
                d.y += (d.y - mouse.y) * 0.03;
            }

            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fillStyle = '#7c3aed';
            ctx.fill();
        });

        for (let i = 0; i < dots.length; i++) {
            for (let j = i + 1; j < dots.length; j++) {
                const dx = dots[i].x - dots[j].x;
                const dy = dots[i].y - dots[j].y;
                const d  = Math.sqrt(dx*dx + dy*dy);
                if (d < 120) {
                    ctx.beginPath();
                    ctx.moveTo(dots[i].x, dots[i].y);
                    ctx.lineTo(dots[j].x, dots[j].y);
                    ctx.strokeStyle = `rgba(124, 58, 237, ${1 - d / 120})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }

        requestAnimationFrame(draw);
    }

    init();
    draw();
})();

/* ════════════════════════════════════
   NAV
════════════════════════════════════ */
function switchPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`panel-${name}`).classList.add('active');
    document.getElementById(`nav-${name}`).classList.add('active');
    // Remove chat badge
    if (name === 'chat') {
        const b = document.querySelector('#nav-chat .badge');
        if (b) b.style.display = 'none';
    }
}

/* ════════════════════════════════════
   TOAST
════════════════════════════════════ */
function showToast(title, body) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${body}</div>`;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => {
        t.classList.add('leaving');
        setTimeout(() => t.remove(), 350);
    }, 3500);
}

/* ════════════════════════════════════
   MOOD BAR
════════════════════════════════════ */
const MOODS = ['☕ Coding', '🔥 Focused', '🎮 Gaming', '🍕 Break', '😴 AFK', '🚀 Shipping'];
const moodRow = document.getElementById('moodRow');

let myMood = localStorage.getItem('chat_mood') || '';

MOODS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn' + (myMood === m ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        myMood = m;
        localStorage.setItem('chat_mood', m);
    };
    moodRow.appendChild(btn);
});

/* ════════════════════════════════════
   CHAT
════════════════════════════════════ */
const messagesArea = document.getElementById('messagesArea');
let msgTodayCount = 0;

function timeLabel(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
}

function appendMessage(sender, text, id, ts, isNew = false) {
    const isMine = sender === myName;
    const row = document.createElement('div');
    row.className = `msg-row ${isMine ? 'is-mine' : 'is-other'}${isNew ? ' new' : ''}`;
    row.dataset.id = id || '';

    const initial = sender.slice(0, 2).toUpperCase();
    const timeStr = ts ? timeLabel(ts) : '';

    row.innerHTML = `
        <div class="msg-avatar ${isMine ? 'is-mine' : 'is-other'}">${initial}</div>
        <div class="msg-body">
            <div class="msg-meta">
                <span class="msg-name">${escHtml(sender)}</span>
                <span class="msg-time">${timeStr}</span>
                ${myMood && isMine ? `<span style="font-size:0.72rem;color:var(--muted)">${myMood}</span>` : ''}
            </div>
            <div class="msg-text">${escHtml(text)}</div>
        </div>
    `;

    messagesArea.appendChild(row);
    messagesArea.scrollTop = messagesArea.scrollHeight;
    msgTodayCount++;
    document.getElementById('statMsgs').textContent = msgTodayCount;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadMessages() {
    const { data } = await db.from('messages').select('*').order('created_at', { ascending: true });
    if (data) data.forEach(m => appendMessage(m.sender, m.text, m.id, m.created_at));
}

let typingTimer;
let isTyping = false;

async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text) return;

    await db.from('messages').insert([{ sender: myName, text }]);
    input.value = '';
    clearTypingStatus();
}

// Typing indicator (uses localStorage broadcast — no extra table needed)
function broadcastTyping() {
    if (!isTyping) {
        isTyping = true;
        localStorage.setItem('typing_user', myName);
        localStorage.setItem('typing_ts', Date.now());
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(clearTypingStatus, 2000);
}

function clearTypingStatus() {
    isTyping = false;
    localStorage.removeItem('typing_user');
}

// Poll typing from localStorage (simple cross-tab trick for two-user setup)
setInterval(() => {
    const user = localStorage.getItem('typing_user');
    const ts   = parseInt(localStorage.getItem('typing_ts') || '0');
    const bar  = document.getElementById('typingBar');
    if (user && user !== myName && Date.now() - ts < 2500) {
        bar.innerHTML = `<span class="typing-dots">${user} πληκτρολογεί <span></span><span></span><span></span></span>`;
    } else {
        bar.innerHTML = '';
    }
}, 400);

document.getElementById('msgInput').addEventListener('input', broadcastTyping);
document.getElementById('msgInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

// Realtime messages
db.channel('public:messages')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
      const m = payload.new;
      // Avoid double-append on sender side
      if (!document.querySelector(`.msg-row[data-id="${m.id}"]`)) {
          appendMessage(m.sender, m.text, m.id, m.created_at, true);
          if (m.sender !== myName) {
              showToast(`💬 ${m.sender}`, m.text.length > 50 ? m.text.slice(0, 50) + '…' : m.text);
              const b = document.querySelector('#nav-chat .badge');
              if (b && !document.getElementById('panel-chat').classList.contains('active')) {
                  b.style.display = '';
              }
          }
      }
  }).subscribe();

// Online count (rough: just show both users as "2 online" when connected)
document.getElementById('onlineCount').textContent = '● Live';

/* ════════════════════════════════════
   EMOJI QUICK INSERT
════════════════════════════════════ */
const EMOJIS = ['😂', '🔥', '👍', '❤️', '🚀', '💯', '😎', '🤔', '✅', '💪'];
let emojiPickerOpen = false;
let emojiPicker = null;

function insertEmoji() {
    if (emojiPickerOpen && emojiPicker) {
        emojiPicker.remove();
        emojiPickerOpen = false;
        return;
    }
    emojiPicker = document.createElement('div');
    emojiPicker.style.cssText = `
        position: fixed;
        bottom: 80px;
        left: 88px;
        background: var(--layer2);

        padding: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        width: 220px;

        b.style.cssText = 'font-size:1.4rem; background:none; border:none; cursor:pointer; padding:4px; border-radius:6px; transition:background 0.1s;';
        b.onmouseenter = () => b.style.background = 'var(--layer3)';
        b.onmouseleave = () => b.style.background = 'none';
        b.onclick = () => {
            const inp = document.getElementById('msgInput');
            inp.value += e;
            inp.focus();
            emojiPicker.remove();
            emojiPickerOpen = false;
        };
        emojiPicker.appendChild(b);
    });
    document.body.appendChild(emojiPicker);
    emojiPickerOpen = true;

    setTimeout(() => {
        document.addEventListener('click', function close(ev) {
            if (!emojiPicker.contains(ev.target)) {
                emojiPicker.remove();
                emojiPickerOpen = false;
                document.removeEventListener('click', close);
            }
        });
    }, 0);
}

/* ════════════════════════════════════
   PROJECTS
════════════════════════════════════ */
const PROJ_ICONS = ['🚀', '🎯', '⚡', '🛠️', '💡', '🔮', '🌐', '🧩'];
let projCount = 0;

function randomProgress() { return Math.floor(Math.random() * 80) + 10; }
function randomIcon()     { return PROJ_ICONS[Math.floor(Math.random() * PROJ_ICONS.length)]; }

function formatDate(ts) {
    return new Date(ts).toLocaleDateString('el-GR', { day: 'numeric', month: 'short' });
}

function renderProjectCard(proj) {
    const grid = document.getElementById('projectsGrid');

    // Remove empty state
    const emp = grid.querySelector('.empty-state');
    if (emp) emp.remove();

    const progress = proj.progress || randomProgress();
    const icon     = proj.icon     || randomIcon();
    const date     = proj.created_at ? formatDate(proj.created_at) : 'τώρα';

    const card = document.createElement('div');
    card.className = 'proj-card';
    card.dataset.id = proj.id || '';
    card.innerHTML = `
        <div class="proj-card-top">
            <div class="proj-icon">${icon}</div>
            <span class="proj-status">Active</span>
        </div>
        <div class="proj-title">${escHtml(proj.title)}</div>
        <div class="proj-desc">Dev project · SupaRoom</div>
        <div class="proj-progress-label">
            <span>Πρόοδος</span>
            <span>${progress}%</span>
        </div>
        <div class="proj-progress-bar">
            <div class="proj-progress-fill" style="width:0%" data-target="${progress}"></div>
        </div>
        <div class="proj-footer">
            <span class="proj-date">📅 ${date}</span>
            <button class="proj-delete" onclick="deleteProject(event, '${proj.id}')">🗑</button>
        </div>
    `;

    grid.appendChild(card);

    // Animate progress bar
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            const fill = card.querySelector('.proj-progress-fill');
            fill.style.width = progress + '%';
        });
    });

    // Add to sidebar
    renderSidebarItem(proj);
    projCount++;
    updateProjStats();
}

function renderSidebarItem(proj) {
    const list = document.getElementById('sidebarProjList');
    const item = document.createElement('div');
    item.className = 'sidebar-proj-item';
    item.dataset.projId = proj.id || '';
    item.innerHTML = `
        <div class="sidebar-proj-dot"></div>
        <span class="sidebar-proj-name">${escHtml(proj.title)}</span>
    `;
    list.appendChild(item);
}

function updateProjStats() {
    document.getElementById('projCount').textContent = `${projCount} active`;
    document.getElementById('statTotal').textContent = projCount;
}

async function loadProjects() {
    const { data } = await db.from('projects').select('*').order('created_at', { ascending: true });
    if (data && data.length > 0) {
        data.forEach(p => renderProjectCard(p));
    }
}

async function createProject() {
    const input = document.getElementById('projInput');
    const title = input.value.trim();
    if (!title) return;

    const { data, error } = await db.from('projects').insert([{
        title,
        status: 'Active',
        icon: randomIcon(),
        progress: randomProgress()
    }]).select().single();

    if (!error && data) {
        input.value = '';
        showToast('📁 Νέο Project', `"${title}" δημιουργήθηκε!`);
    }
}

async function deleteProject(e, id) {
    e.stopPropagation();
    if (!id) return;
    await db.from('projects').delete().eq('id', id);

    const card = document.querySelector(`.proj-card[data-id="${id}"]`);
    if (card) { card.style.opacity = '0'; card.style.transform = 'scale(0.9)'; card.style.transition = '0.2s'; setTimeout(() => card.remove(), 200); }

    const sItem = document.querySelector(`.sidebar-proj-item[data-proj-id="${id}"]`);
    if (sItem) sItem.remove();

    projCount = Math.max(0, projCount - 1);
    updateProjStats();

    if (document.querySelectorAll('.proj-card').length === 0) {
        document.getElementById('projectsGrid').innerHTML = `<div class="empty-state"><span class="empty-icon">🚀</span><p>Κανένα project.<br>Πρόσθεσε το πρώτο!</p></div>`;
    }
}

// Realtime projects
db.channel('public:projects')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'projects' }, payload => {
      const p = payload.new;
      if (!document.querySelector(`.proj-card[data-id="${p.id}"]`)) {
          renderProjectCard(p);
          showToast('📁 Νέο Project', `"${p.title}" προστέθηκε!`);
      }
  })
  .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'projects' }, payload => {
      const id = payload.old.id;
      const card  = document.querySelector(`.proj-card[data-id="${id}"]`);
      const sItem = document.querySelector(`.sidebar-proj-item[data-proj-id="${id}"]`);
      if (card)  { card.remove();  projCount = Math.max(0, projCount - 1); updateProjStats(); }
      if (sItem) sItem.remove();
  }).subscribe();

document.getElementById('projInput').addEventListener('keypress', e => { if (e.key === 'Enter') createProject(); });

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
loadMessages();
loadProjects();
showToast(`👋 Γεια σου, ${myName}!`, 'SupaRoom είναι έτοιμο.');

function logout() {
    localStorage.removeItem('chat_username');
    localStorage.removeItem('chat_mood');
    location.reload();
}
</script>
