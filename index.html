<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --accent: #6366f1; }
        
        body { 
            margin: 0; 
            background: #0f172a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
        }

        /* Animation για το form */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 320px;
            animation: fadeIn 0.8s ease-out;
            color: white;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background: #4f46e5; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="margin-top:0">Welcome Back</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Σύνδεση</button>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if ((u === 'marinos' && p === 'marinos') || (u === 'giorgos' && p === 'giorgos')) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'workspace.html';
            } else {
                alert("Λάθος στοιχεία!");
            }
        }
    </script>
</body>
</html>
